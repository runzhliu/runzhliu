name: Update profile README

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-profile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Update contribution table
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_LOGIN: runzhliu
        run: node scripts/update-contributions.mjs

      - name: Commit changes
        run: |
          if git diff --quiet; then
            exit 0
          fi

          git config user.name "runzhliu"
          git config user.email "runzhliu@163.com"
          git add README.md
          git commit -m "chore: update profile contributions"
          git push
